server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
    gateway:
      routes:
        - id: product-route
          uri: lb://product-service   # lb:// 从 Nacos 负载均衡取服务
          predicates:
            - Path=/api/product/**
        - id: order-route
          uri: lb://order-service
          predicates:
            - Path=/api/order/**
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
