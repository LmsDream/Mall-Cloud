server:
  port: 8081
spring:
  application:
    name: product-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    #mysql5.7不需要serverTimezone，但佳航也不报错
    url: jdbc:mysql://localhost:3306/mall_db?useSSL=false&characterEncoding=utf8
    username: root
    password: root
  redis:
    host: localhost
    port: 6379
    database: 0
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
 #mybatis-plus 打印sql
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

seata:
  tx-service-group: my_test_tx_group # 事务分组名，可以自定义
  registry:
    type: nacos
    nacos:
      server-addr: localhost:8848
      group: SEATA_GROUP
      namespace: ""
      username: "nacos"
      password: "nacos"
  service:
    vgroup-mapping:
      my_test_tx_group: default # 将事务分组映射到 Seata 集群